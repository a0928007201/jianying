<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<title>þ░íÞï▒Õç║Õ¡ù</title>
<style>
  :root {
    --bg:#000; --cn:#00FFFF; --en:#FFFF00; --ok:#00FF00;
    --err:#FF4444; --tip:#888; --red:#CC2200; --exp:#AAFFAA;
    --kb-bg:#2a2a2a; --kb-fg:#fff; --kb-hi:#FFFF00;
    --kb-hi-fg:#000; --kb-done:#444; --kb-border:#555;
    --blue:#0055FF;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--cn);font-family:'Courier New',monospace;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
  #app{display:flex;flex-direction:column;height:100vh;padding:4px 8px;gap:2px;justify-content:space-between;}
  #title{display:flex;justify-content:space-between;align-items:center;color:var(--cn);font-size:clamp(12px,4vw,18px);font-weight:bold;flex-shrink:0;}
  #title-ver{color:var(--tip);font-size:clamp(10px,3.5vw,15px);}
  #rows{flex-shrink:0;font-size:clamp(16px,5.5vw,30px);line-height:1.5;}
  .row{display:flex;flex-wrap:nowrap;min-height:1.4em;}
  .cell{display:inline-flex;align-items:center;min-width:2.5em;padding:0 2px;}
  #row1 .cell{color:var(--cn);}
  #row2 .cell{color:var(--ok);}
  #row3 .cell{color:var(--en);font-size:.8em;}
  #row4 .cell{color:var(--en);font-size:.8em;}
  .cell.active-code{border:2px solid var(--en);border-radius:3px;}
  #inp-row{display:flex;flex-wrap:nowrap;background:#111;padding:4px 6px;border-radius:4px;min-height:1.6em;font-size:clamp(14px,5vw,26px);flex-shrink:0;}
  .inp-cell{min-width:2.5em;color:var(--tip);padding:0 2px;}
  .inp-cell.current{color:#fff;border:2px solid var(--en);border-radius:3px;background:#001133;}
  #msg{font-size:clamp(13px,4.5vw,22px);min-height:1.2em;flex-shrink:0;}
  #exp{font-size:clamp(12px,4vw,20px);color:var(--exp);flex-shrink:0;display:none;overflow:hidden;}
  #exp-line{border-top:3px solid var(--red);margin:2px 0;}
  #exp-title{color:var(--tip);margin-bottom:1px;}
  #keyboard{flex-shrink:0;display:flex;flex-direction:column;gap:1.5vw;padding:0 0 3px;}
  .kb-row{display:flex;gap:1.5vw;width:100%;}
  .kb-key{flex:1;min-width:0;background:var(--kb-bg);color:var(--kb-fg);border:1px solid var(--kb-border);border-radius:6px;font-family:'Courier New',monospace;font-size:clamp(13px,4.5vw,22px);font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;height:8vh;user-select:none;-webkit-user-select:none;transition:background .05s;}
  .kb-key.space-key{flex:5;height:8vh;}
  .kb-key.next-key{background:#1a3a1a;color:#00FF00;border-color:#00FF00;font-size:clamp(16px,5vw,26px);}
  .kb-key.fj-key::after{content:'';position:absolute;bottom:3px;left:20%;width:60%;height:2px;background:var(--en);border-radius:1px;}
  .kb-key.highlighted{background:var(--kb-hi);color:var(--kb-hi-fg);border:2px solid var(--blue);}
  .kb-key.blinking-on{background:var(--kb-hi);color:var(--kb-hi-fg);border:2px solid var(--blue);}
  .kb-key.blinking-off{background:#000033;color:var(--en);border:2px solid var(--blue);}
  .kb-key.flashing{background:var(--red);color:#fff;border:2px solid var(--red);}
  .kb-key.done{background:var(--kb-done);color:#888;border-color:#666;}
  .key-num{position:absolute;bottom:3px;right:4px;font-size:.75em;color:var(--red);font-weight:bold;line-height:1;}
  #bottom{display:flex;justify-content:space-between;font-size:clamp(10px,3.5vw,14px);color:var(--tip);flex-shrink:0;padding:1px 0;}
</style>
</head>
<body>
<div id="app">
  <div id="title">
    <span id="title-ver"></span>
    <span>þ░íÞï▒Õç║Õ¡ù</span>
  </div>
  <div id="rows">
    <div class="row" id="row1"></div>
    <div class="row" id="row2"></div>
    <div class="row" id="row3"></div>
    <div class="row" id="row4"></div>
  </div>
  <div id="inp-row"></div>
  <div id="msg"></div>
  <div id="exp">
    <div id="exp-line"></div>
    <div id="exp-title">ÔöÇ þó╝Þí¿Þ¬¬µÿÄ ÔöÇ</div>
    <div id="exp-body"></div>
  </div>
  <div id="keyboard"></div>
  <div id="bottom">
    <span id="sent-label"></span>
    <span id="ver"></span>
  </div>
</div>
<script>
const RAW_SENTENCES = ["þÄïÞÿ¡Þè▒´╝îµêæµäøÕª│", "õ¢áµêæõ╗û´╝îÕ┐âµâ│õ║ïµêÉ", "Þü¢Þ¬¬Þ«ÇÕ»½´╝øþÁéþöƒµ£ëÕñó", "õ©èõ©ïÕÀªÕÅ│ÒÇéÚûïÚù£Ú½ÿõ¢Ä", "Þï▒Þ¬×µòÖÕ¡©´╝îÚÇÜþö¿ÕÅ»Þíî"];
const CODE_TABLE    = {"´╝ø": [";", "ÕêåÞÖƒ"], "´╝î": [",", "Þ▒åÞÖƒÞÖƒ"], "ÒÇé": [".", "ÕÅÑÞÖƒÞÖƒ"], "µäø": ["lv", "LoVeµäø"], "Õª│": ["gu", "ÕÑ│þöƒGþÜäÕª│U_GU"], "Õ╝Á": ["ul", "uÕ×ïÕ╝ô+LnÚòÀ"], "Õ┐ù": ["lh", "Õ£ƒL+Õ┐âHeart"], "Õ«ë": ["cg", "CÕ×ï+ÕÑ│Girl"], "þÉ¬": ["58", "þÄï5Õ×ï+Õà½Õ×ï"], "µÀæ": ["3un", "õ©ëÚ╗×µ░┤3+ÕÅöUNc"], "þôè": ["5vx", "þÄï5+Vv+Xx"], "Õ¥É": ["vat", "Õ¥êv+Aa+µ£¿t"], "µ║É": ["3s", "õ©ëÚ╗×µ░┤3+Õ░Ås"], "Õ«Å": ["cxv", "Cc+Xx+Vv"], "µ¢ÿ": ["3m4", "õ©ëÚ╗×µ░┤3+µ£êM+þö░4"], "µª«": ["fnt", "þü½F+Nn+µ£¿t"], "µâ│": ["th", "THinkµâ│"], "õ║ï": ["ma", "MAtterÒÇîõ║ïÒÇìµâà"], "µêÉ": ["ad", "ADultÒÇîµêÉÒÇìõ║║"], "µ×ù": ["tt", "ÚøÖµ£¿µ×ù´╝îµ£¿t+µ£¿t"], "Õñ®": ["sk", "SKyÕñ®"], "þöƒ": ["lf", "LiFeþöƒµ┤╗þÜäþöƒ"], "Õ╗û": ["v53", "VÕ×ï+þ¥¢5Õ×ï+õ©ë3Õ×ï"], "õ╗ò": ["ylz", "õ║║Y + Lz(Õ£ƒLõ╣ïÚî»Ú½ö)"], "Õ╝À": ["ub", "UÕ×ïÕ╝ô+ÞÖ½B"], "Ú╗â": ["yel", "YELoow"], "Õ¡É": ["so", "SOnÕ¡É"], "µÂÁ": ["3vw", "õ©ëÚ╗×µ░┤3+VÕ×ï+µ░┤w"], "þÄï": ["ki", "KIng"], "Þÿ¡": ["0dt", "Õìü0+ÚûÇDoor+µ£¿t"], "Þè▒": ["fw", "FoWelly"], "Õéà": ["y0i", "õ║║y+Õìü0+Õ»©inch"], "õ║×": ["as", "ASiaõ║×µ┤▓"], "Ú¥ì": ["il", "þ½ïi+LÕ×ï"], "þÄë": ["5.", "þÄï5+Ú╗×."], "µòÅ": ["evx", "µ»ÅEVey+xÕ×ï"], "µªå": ["tak", "µ£¿t+AÕ×ï+ÕêÇk"], "ÚØ£": ["1mj", "1Õ×ï+µ£êm+JÕ×ï"], "Õ┐â": ["hea", "HEArt"], "õ¢á": ["u", "yoUõ¢á"], "µêæ": ["i", "Iµêæ"], "õ╗û": ["he", "HEõ╗û"], "µùÑ": ["d", "DayµùÑ"], "Õ┐½": ["fs", "FaStÕ┐½"], "µ¿é": ["mu", "MUsicÚƒ│µ¿éþÜäµ¿é"], "Þü¢": ["ls", "LiStenÞü¢"], "Þ¬¬": ["sa", "SAyÞ¬¬"], "Þ«Ç": ["rea", "REAdÞ«Ç"], "Õ»½": ["wr", "WRiteÕ»½"], "þÁé": ["end", "ENDþÁé"], "µ£ë": ["v", "haVeµ£ë"], "Õñó": ["dre", "DREamÕñó"], "õ©è": ["up", "upõ©è"], "õ©ï": ["dn", "DowNõ©ï"], "ÕÀª": ["le", "LEftÕÀª"], "ÕÅ│": ["ri", "RIghtÕÅ│"], "Úûï": ["on", "ONÚûï"], "Úù£": ["of", "OFfÚù£"], "Ú½ÿ": ["hi", "HIghtÚ½ÿ"], "õ¢Ä": ["lw", "Lowõ¢Ä"], "Þï▒": ["en", "ENglishÞï▒µûç"], "Þ¬×": ["lan", "LANguageÞ¬×Þ¿Ç"], "µòÖ": ["eu", "EdUcateµòÖÞé▓"], "Õ¡©": ["sc", "SChoolÕ¡©µáí"], "ÚÇÜ": ["ps", "PaSsÚÇÜÚüÄ"], "þö¿": ["us", "USeþö¿"], "ÕÅ»": ["ok", "OKÕÅ»õ╗Ñ"], "Þíî": ["ac", "ACtionÞíîÕïò"]};
const PUNCT = {"´╝î":",","ÒÇé":".","´╝ü":"!","´╝ƒ":"?","´╝ø":";","ÒÇü":","};

function parseSentence(raw) {
  const chars=[], codes=[];
  for(const ch of raw) {
    if(PUNCT[ch]) { chars.push(ch); codes.push(PUNCT[ch]); }
    else if(CODE_TABLE[ch]) { chars.push(ch); codes.push(CODE_TABLE[ch][0]); }
  }
  return {chars, codes, raw};
}
const SENTENCES = RAW_SENTENCES.map(parseSentence);

// þëêµ£¼ÞÖƒ´╝Üµ£êµùÑ_µÖéÕêå
(function(){
  const n=new Date();
  const mm=String(n.getMonth()+1).padStart(2,'0');
  const dd=String(n.getDate()).padStart(2,'0');
  const hh=String(n.getHours()).padStart(2,'0');
  const mi=String(n.getMinutes()).padStart(2,'0');
  const ver=mm+dd+'_'+hh+mi;
  document.getElementById('title-ver').textContent=ver;
  document.getElementById('ver').textContent=ver;
})();

// 41ÚìÁÚìÁþøñ
const KB_ROWS = [
  {offset:0,   keys:["1","2","3","4","5","6","7","8","9","0","-"]},
  {offset:0.3, keys:["q","w","e","r","t","y","u","i","o","p"]},
  {offset:0.6, keys:["a","s","d","f","g","h","j","k","l",";"]},
  {offset:1.0, keys:["z","x","c","v","b","n","m",",",".","/"]}
];
const FJ = new Set(["f","j"]);

let sentIdx=0, charIdx=0, inputBuf="";
let blinkTimer=null, blinkKey=null, blinkOn=true;
let targetKeys=new Set(), targetOrder={}, typedKeys=new Set(), nextBlinkKeys=[];
const keyEls={};

function buildKeyboard() {
  const kb=document.getElementById("keyboard");
  KB_ROWS.forEach(row => {
    const rEl=document.createElement("div"); rEl.className="kb-row";
    if(row.offset>0) { const s=document.createElement("div"); s.style.flex=row.offset.toFixed(1); rEl.appendChild(s); }
    row.keys.forEach((key,ci) => {
      if(ci===5 && row.keys.length<=10) { const g=document.createElement("div"); g.style.flex="0.2"; rEl.appendChild(g); }
      const el=document.createElement("div");
      el.className="kb-key"+(FJ.has(key)?" fj-key":"")+(key==="-"?" next-key":"");
      el.dataset.key=key;
      el.textContent=key==="-"?"ÔûÂ":key.toUpperCase();
      el.addEventListener("click",()=>handleKey(key));
      el.addEventListener("touchstart",e=>{e.preventDefault();handleKey(key);},{passive:false});
      keyEls[key]=el; rEl.appendChild(el);
    });
    kb.appendChild(rEl);
  });
  const spRow=document.createElement("div"); spRow.className="kb-row";
  const p1=document.createElement("div"); p1.style.flex="1.5"; spRow.appendChild(p1);
  const spEl=document.createElement("div"); spEl.className="kb-key space-key"; spEl.textContent="SPACE";
  spEl.addEventListener("click",()=>handleKey("space"));
  spEl.addEventListener("touchstart",e=>{e.preventDefault();handleKey("space");},{passive:false});
  keyEls["space"]=spEl; spRow.appendChild(spEl);
  const p2=document.createElement("div"); p2.style.flex="1.5"; spRow.appendChild(p2);
  kb.appendChild(spRow);
}

function setKeyState(key,state) {
  if(!keyEls[key]) return;
  const el=keyEls[key];
  const isSpace=key==="space";
  const isNext=key==="-";
  let cls="kb-key"+(FJ.has(key)?" fj-key":"")+(isSpace?" space-key":"")+(isNext?" next-key":"");
  if(state==="highlighted") cls+=" highlighted";
  else if(state==="blinking-on") cls+=" blinking-on";
  else if(state==="blinking-off") cls+=" blinking-off";
  else if(state==="flashing") cls+=" flashing";
  else if(state==="done") cls+=" done";
  el.className=cls;
}

function setKeyNum(key,num) {
  if(!keyEls[key]) return;
  clearKeyNum(key);
  const s=document.createElement("span"); s.className="key-num"; s.textContent=num;
  keyEls[key].appendChild(s);
}
function clearKeyNum(key) {
  if(!keyEls[key]) return;
  const o=keyEls[key].querySelector(".key-num"); if(o) o.remove();
}

function stopBlink() {
  if(blinkTimer) { clearInterval(blinkTimer); blinkTimer=null; }
  if(blinkKey && keyEls[blinkKey]) setKeyState(blinkKey, targetKeys.has(blinkKey)?"highlighted":"normal");
  blinkKey=null;
}

function startBlink(key) {
  stopBlink(); blinkKey=key; blinkOn=true;
  blinkTimer=setInterval(()=>{
    blinkOn=!blinkOn;
    setKeyState(key, blinkOn?"blinking-on":"blinking-off");
    if(blinkOn && targetOrder[key]!==undefined) setKeyNum(key,targetOrder[key]);
    else clearKeyNum(key);
  },350);
}

function clearAllHighlights() {
  stopBlink();
  Object.keys(keyEls).forEach(k=>{ setKeyState(k,"normal"); clearKeyNum(k); });
  targetKeys=new Set(); targetOrder={}; typedKeys=new Set(); nextBlinkKeys=[];
}

function highlightTargets(code) {
  clearAllHighlights();
  const keys=[];
  [...code.toLowerCase()].forEach((ch,i)=>{
    const k=ch===" "?"space":ch;
    if(!targetKeys.has(k)) keys.push(k);
    targetKeys.add(k); targetOrder[k]=i+1;
    setKeyState(k,"highlighted"); setKeyNum(k,i+1);
  });
  nextBlinkKeys=keys;
  if(keys.length>0) startBlink(keys[0]);
}

function flashKey(key,callback) {
  stopBlink(); typedKeys.add(key); clearKeyNum(key);
  setKeyState(key,"flashing");
  setTimeout(()=>{
    setKeyState(key,"done");
    const next=nextBlinkKeys.find(k=>!typedKeys.has(k)&&targetKeys.has(k));
    if(next) startBlink(next);
    if(callback) callback();
  },180);
}

function drawRows() {
  const {chars,codes}=SENTENCES[sentIdx];
  ["row1","row2","row3","row4"].forEach(id=>document.getElementById(id).innerHTML="");
  chars.forEach((ch,i)=>{
    const code=codes[i];
    const mkCell=(id,txt,style)=>{
      const c=document.createElement("div");
      c.className="cell"+(id==="row3"&&i===charIdx?" active-code":"");
      c.style.minWidth="2.5em"; if(style) c.style.cssText+=style;
      c.textContent=txt; document.getElementById(id).appendChild(c);
    };
    mkCell("row1",ch);
    mkCell("row2",i<charIdx?ch:"");
    mkCell("row3",code, i<charIdx?"color:var(--tip)":"");
    mkCell("row4",i===charIdx?"Ôåæ":" ");
  });
}

function drawInp() {
  const {codes}=SENTENCES[sentIdx];
  const inp=document.getElementById("inp-row"); inp.innerHTML="";
  codes.forEach((code,i)=>{
    const c=document.createElement("div");
    c.className="inp-cell"+(i===charIdx?" current":"");
    c.style.minWidth="2.5em";
    c.textContent=i<charIdx?code+"_":i===charIdx?inputBuf+"_":"";
    inp.appendChild(c);
  });
}

function setMsg(txt,type) {
  const el=document.getElementById("msg"); el.textContent=txt;
  el.style.color=type==="ok"?"var(--ok)":type==="err"?"var(--err)":"var(--tip)";
}

function showExplanation() {
  const {chars,codes}=SENTENCES[sentIdx];
  const body=document.getElementById("exp-body"); body.innerHTML="";
  const seen=new Set();
  chars.forEach((ch,i)=>{
    const code=codes[i]; if(seen.has(code)) return; seen.add(code);
    const info=CODE_TABLE[ch];
    const desc=info?info[1]:"µ¿ÖÚ╗×";
    const d=document.createElement("div");
    d.textContent=`  ${code.padEnd(6)} ${ch}  ${desc}`;
    body.appendChild(d);
  });
  document.getElementById("exp").style.display="block";
}

function handleKey(key) {
  if(key==="-") { sentIdx=(sentIdx+1)%SENTENCES.length; loadSentence(); return; }
  const {chars,codes}=SENTENCES[sentIdx];
  if(charIdx>=chars.length) { loadSentence(); return; }
  if(key==="space") { confirmInput(); return; }
  inputBuf+=key.toLowerCase(); drawInp();
  flashKey(key.toLowerCase(),()=>{
    const target=codes[charIdx]||"";
    if(inputBuf.toLowerCase()===target.toLowerCase()) startBlink("space");
  });
}

function confirmInput() {
  const {chars,codes}=SENTENCES[sentIdx];
  const target=codes[charIdx]||"";
  if(inputBuf.trim().toLowerCase()===target.toLowerCase()) {
    stopBlink(); charIdx++; inputBuf="";
    drawRows(); drawInp();
    if(charIdx>=chars.length) {
      clearAllHighlights();
      setMsg("Ô£ô  Õ«îµêÉ´╝üõ╗╗µäÅÚìÁ=ÚçìµëôÒÇÇÔûÂ=õ©ïõ©ÇÕÅÑ","ok");
      showExplanation();
    } else {
      setMsg(`Ô£ô  µ¡úþó║´╝üõ©ïõ©ÇÕÇï´╝Ü${codes[charIdx]}`,"ok");
      highlightTargets(codes[charIdx]);
    }
  } else {
    setMsg(`Ô£ù  µçëÞ╝©ÕàÑ´╝Ü${target}ÒÇÇõ¢áÞ╝©ÕàÑ´╝Ü${inputBuf}`,"err");
    inputBuf=""; drawInp();
  }
}

function loadSentence() {
  charIdx=0; inputBuf="";
  clearAllHighlights();
  document.getElementById("exp").style.display="none";
  setMsg("","");
  drawRows(); drawInp();
  document.getElementById("sent-label").textContent=
    `ÕÅÑ${sentIdx+1}/${SENTENCES.length}  ÔûÂ=õ©ïõ©ÇÕÅÑ`;
  const {codes}=SENTENCES[sentIdx];
  if(codes.length>0) highlightTargets(codes[0]);
}

document.addEventListener("keydown",e=>{
  if(e.key==="F1"||e.key==="-"){e.preventDefault();sentIdx=(sentIdx+1)%SENTENCES.length;loadSentence();return;}
  if(e.key==="Backspace"){inputBuf=inputBuf.slice(0,-1);drawInp();return;}
  if(e.key===" "||e.key==="Enter"){e.preventDefault();confirmInput();return;}
  if(e.key.length===1&&/[a-zA-Z0-9,;./]/.test(e.key)) handleKey(e.key.toLowerCase());
});

buildKeyboard();
loadSentence();
</script>
</body>
</html>
